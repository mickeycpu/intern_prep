{% extends "base.html" %}
{% block title %}学生列表{% endblock %}

{% block content %}
<h1>📋 学生列表</h1>

<div class="search-form">
    <form method="GET" action="{{ url_for('students.index') }}">
        <input type="text" name="keyword" placeholder="搜索姓名..." value="{{ keyword }}">
        <button type="submit">搜索</button>
        {% if keyword %}
            <a href="{{ url_for('students.index') }}">清除搜索</a>
        {% endif %}
    </form>
</div>

<table>
    <tr>
        <th>ID</th><th>姓名</th><th>年龄</th><th>成绩</th><th>操作</th>
    </tr>
    {% for s in students %}
    <tr>
        <td>{{ s.id }}</td>
        <td>{{ s.name }}</td>
        <td>{{ s.age }}</td>
        <td>{{ s.score }}</td>
        <td>
            <a href="{{ url_for('students.edit', id=s.id) }}">编辑</a>
            <a href="{{ url_for('students.delete', id=s.id) }}" class="btn-danger"
               onclick="return confirm('确定删除 {{ s.name }}？')">删除</a>
        </td>
    </tr>
    {% else %}
    <tr><td colspan="5">暂无学生数据</td></tr>
    {% endfor %}
</table>
{% endblock %}
