{% extends "base.html" %}
{% block title %}编辑记录 - 记账本{% endblock %}

{% block content %}
<h1 style="margin-bottom: 20px;">✏️ 编辑记录</h1>
<form method="POST" action="{{ url_for('records.edit', id=record.id) }}">
    <div class="form-group">
        <label>类型</label>
        <select name="type">
            <option value="expense" {% if record.type == 'expense' %}selected{% endif %}>支出</option>
            <option value="income" {% if record.type == 'income' %}selected{% endif %}>收入</option>
        </select>
    </div>
    <div class="form-group">
        <label>分类</label>
        <input type="text" name="category" value="{{ record.category }}">
    </div>
    <div class="form-group">
        <label>金额</label>
        <input type="number" name="amount" step="0.01" value="{{ record.amount }}">
    </div>
    <div class="form-group">
        <label>备注（可选）</label>
        <textarea name="note">{{ record.note or '' }}</textarea>
    </div>
    <button type="submit" class="btn btn-success">💾 保存修改</button>
    <a href="{{ url_for('records.index') }}" class="btn btn-primary">↩ 返回列表</a>
</form>
{% endblock %}
