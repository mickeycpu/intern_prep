<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}记账本{% endblock %}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f5f5f5; color: #333; }
        nav { background: #2c3e50; padding: 15px 30px; }
        nav a { color: white; text-decoration: none; margin-right: 20px; font-size: 16px; }
        nav a:hover { color: #3498db; }
        .container { max-width: 900px; margin: 20px auto; padding: 0 20px; }
        .flash { padding: 12px 20px; margin-bottom: 15px; border-radius: 5px; }
        .flash.success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .flash.error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: #34495e; color: white; }
        tr:hover { background: #f0f0f0; }
        .btn { padding: 6px 14px; border: none; border-radius: 4px; cursor: pointer; text-decoration: none; font-size: 14px; display: inline-block; }
        .btn-primary { background: #3498db; color: white; }
        .btn-danger { background: #e74c3c; color: white; }
        .btn-success { background: #27ae60; color: white; }
        .btn:hover { opacity: 0.85; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px;
        }
        .form-group textarea { height: 80px; resize: vertical; }
        .stats { display: flex; gap: 15px; margin-bottom: 20px; }
        .stat-card { flex: 1; padding: 20px; border-radius: 8px; text-align: center; color: white; }
        .stat-card.income { background: #27ae60; }
        .stat-card.expense { background: #e74c3c; }
        .stat-card.balance { background: #2c3e50; }
        .stat-card .amount { font-size: 28px; font-weight: bold; margin-top: 5px; }
        .stat-card .label { font-size: 14px; opacity: 0.9; }
        .type-income { color: #27ae60; font-weight: bold; }
        .type-expense { color: #e74c3c; font-weight: bold; }
    </style>
</head>
<body>
    <nav>
        <a href="{{ url_for('records.index') }}">📋 记录列表</a>
        <a href="{{ url_for('records.add') }}">➕ 添加记录</a>
    </nav>
    <div class="container">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, msg in messages %}
                    <div class="flash {{ category }}">{{ msg }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        {% block content %}{% endblock %}
    </div>
</body>
</html>
