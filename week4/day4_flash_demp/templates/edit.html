{% extends "base.html" %}
{% block title %}编辑学生{% endblock %}
{% block content %}
<h2>编辑学生（ID: {{ student.id }}）</h2>
<form method="POST">
    姓名：<input type="text" name="name" value="{{ student.name }}" required><br><br>
    年龄：<input type="number" name="age" value="{{ student.age }}" required><br><br>
    分数：<input type="number" step="0.1" min="0" max="100" name="score" value="{{ student.score }}" required><br><br>
    <button type="submit">💾 保存修改</button>
    <a href="{{ url_for('index') }}">← 返回列表</a>
</form>
{% endblock %}
